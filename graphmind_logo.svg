<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gradLight" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Background circle for contrast in both themes -->
  <circle cx="100" cy="100" r="92" fill="url(#grad)" opacity="0.08"/>
  <circle cx="100" cy="100" r="92" stroke="url(#grad)" stroke-width="3" fill="none" opacity="0.3"/>

  <!-- Graph connections (thicker strokes) -->
  <g stroke="url(#grad)" stroke-width="3.5" stroke-linecap="round">
    <line x1="55" y1="55" x2="145" y2="55"/>
    <line x1="55" y1="55" x2="100" y2="115"/>
    <line x1="145" y1="55" x2="100" y2="115"/>
    <line x1="100" y1="115" x2="55" y2="148"/>
    <line x1="100" y1="115" x2="145" y2="148"/>
    <line x1="55" y1="148" x2="145" y2="148"/>
  </g>

  <!-- Nodes (larger, with white center for visibility) -->
  <g>
    <circle cx="55" cy="55" r="10" fill="url(#grad)"/>
    <circle cx="55" cy="55" r="5" fill="white" opacity="0.4"/>
    <circle cx="145" cy="55" r="10" fill="url(#grad)"/>
    <circle cx="145" cy="55" r="5" fill="white" opacity="0.4"/>
    <circle cx="100" cy="115" r="13" fill="url(#grad)"/>
    <circle cx="100" cy="115" r="7" fill="white" opacity="0.4"/>
    <circle cx="55" cy="148" r="10" fill="url(#grad)"/>
    <circle cx="55" cy="148" r="5" fill="white" opacity="0.4"/>
    <circle cx="145" cy="148" r="10" fill="url(#grad)"/>
    <circle cx="145" cy="148" r="5" fill="white" opacity="0.4"/>
  </g>

  <!-- Brain-like curve overlay (thicker) -->
  <path d="M72 90 C84 68, 116 68, 128 90
           C140 112, 118 138, 100 132
           C82 138, 60 112, 72 90 Z"
        stroke="url(#grad)" stroke-width="3" fill="none" opacity="0.5"/>
</svg>
