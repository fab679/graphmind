<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for AI feel -->
    <linearGradient id="grad" x1="0" y1="0" x2="200" y2="200">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Graph connections -->
  <g stroke="url(#grad)" stroke-width="2">
    <line x1="60" y1="60" x2="140" y2="60"/>
    <line x1="60" y1="60" x2="100" y2="120"/>
    <line x1="140" y1="60" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="60" y2="140"/>
    <line x1="100" y1="120" x2="140" y2="140"/>
  </g>

  <!-- Nodes -->
  <g fill="url(#grad)">
    <circle cx="60" cy="60" r="5"/>
    <circle cx="140" cy="60" r="5"/>
    <circle cx="100" cy="120" r="6"/>
    <circle cx="60" cy="140" r="5"/>
    <circle cx="140" cy="140" r="5"/>
  </g>

  <!-- Brain-like curve overlay -->
  <path d="M75 95 C85 75, 115 75, 125 95 
           C135 115, 115 135, 100 130 
           C85 135, 65 115, 75 95 Z"
        stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.6"/>
</svg>